services:
  proxy:
    image: nginx:latest
    restart: always
    ports:
      - 80:80
    volumes:
      - ./proxy.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - internal
    depends_on:
      - bot
      - web
  
  web:
    build: ./chall
    restart: unless-stopped
    networks:
      - internal

  bot:
    build:
      context: ./bot
      args:
        - BROWSER=chromium
    restart: always
    environment:
      APPNAME: TodoList
      APPURL:  https://todolist.challs.srdnlen.it 
      APPURLREGEX: ^http(|s)://.*$
      APPFLAG: srdnlen{leakycstiggwp}
      APPLIMIT: 2
      APPLIMITTIME: 60
      USE_PROXY: 1
    networks:
      - internal

networks:
  internal:
